<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — ARUKAS HAIR</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: oklch(18% 0.015 45);
    --accent: oklch(66% 0.155 42);
    --accent-deep: oklch(56% 0.160 38);
    --bg: oklch(97% 0.008 65);
    --white: oklch(100% 0 0);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--ink); padding:24px;
  }
  .card{max-width:520px; text-align:center;}
  .slash{display:inline-block; width:44px; height:4px; background:var(--accent); transform:skewX(-24deg); margin-bottom:28px;}
  h1{font-family:'Playfair Display',serif; font-weight:600; font-size:clamp(2rem,5vw,2.8rem); margin:0 0 16px;}
  p{color:oklch(46% 0.02 50); font-size:1.05rem; line-height:1.6; margin:0 0 32px;}
  a.btn{
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--accent); color:var(--white); font-weight:600; letter-spacing:.03em;
    padding:14px 30px; border-radius:6px; text-decoration:none; transition:background-color .2s, transform .2s;
  }
  a.btn:hover{background:var(--accent-deep); transform:translateY(-2px);}
  a.btn:focus-visible{outline:3px solid oklch(85% 0.045 25); outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){ a.btn{transition:none;} }
</style>
</head>
<body>
  <div class="card">
    <span class="slash" aria-hidden="true"></span>
    <h1>Thank you</h1>
    <p>Your message has been received. We'll be in touch soon to set up your appointment. If it's urgent, call us at (972) 517-1350.</p>
    <a class="btn" href="/">Back to home</a>
  </div>
</body>
</html>

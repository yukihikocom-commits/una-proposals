<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ありがとうございます — Nana Williams ダラス不動産</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .ty { min-height: 100svh; display: grid; place-items: center; text-align: center; padding: var(--space-6); }
  .ty-card { max-width: 560px; }
  .ty h1 { font-family: var(--font-jp); font-weight: 700; font-size: clamp(1.6rem,4vw,2.2rem); color: var(--color-primary); }
  .ty p { color: var(--color-muted); margin-top: var(--space-4); }
  .ty .btn { margin-top: var(--space-6); }
  .ty .mark { width: 56px; height: 56px; margin: 0 auto var(--space-4); border-radius: 50%;
    background: var(--color-primary); display: grid; place-items: center; }
  .ty .mark::after { content: ""; width: 18px; height: 9px; border-left: 2px solid var(--color-accent);
    border-bottom: 2px solid var(--color-accent); transform: rotate(-45deg) translate(1px,-2px); }
</style>
</head>
<body>
  <section class="ty">
    <div class="ty-card">
      <div class="mark" aria-hidden="true"></div>
      <h1>ご相談ありがとうございます</h1>
      <p>メッセージを受け取りました。内容を確認のうえ、追ってご連絡いたします。<br>お急ぎの場合は、お電話（+1&nbsp;360-594-8015）でもお気軽にどうぞ。</p>
      <a class="btn btn-primary" href="/">トップに戻る</a>
    </div>
  </section>
</body>
</html>
